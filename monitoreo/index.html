<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monitoreo Parqueadero</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="app.css" />
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">

    <div class="flex h-screen">
        <div class="w-80 bg-slate-900 border-r border-slate-700 flex flex-col">
            <div class="p-6 border-b border-slate-700">
                <h1 class="text-2xl font-bold flex items-center gap-3">
                    🅿️ Monitoreo Parqueadero
                </h1>
                <p class="text-slate-400 text-sm mt-1">Control en Tiempo Real</p>
            </div>

            <div class="p-4">
                <button onclick="verTodasLasZonas()" 
                        class="w-full mb-4 px-4 py-3 bg-slate-800 hover:bg-slate-700 rounded-2xl flex items-center gap-3 font-medium transition-colors">
                    📊 Ver Todos los Espacios
                </button>
                
                <h2 class="text-xs uppercase tracking-widest text-slate-500 mb-3 px-3">ZONAS</h2>
                <div id="zonasList" class="space-y-2 max-h-[calc(100vh-180px)] overflow-auto pr-2 pb-4"></div>
            </div>
        </div>

        <div class="flex-1 flex flex-col">
            <header class="bg-slate-900 border-b border-slate-700 px-8 py-5 flex items-center justify-between sticky top-0 z-10 shadow-sm">
                <div>
                    <h2 id="tituloPrincipal" class="text-3xl font-semibold">Dashboard General</h2>
                    <p id="subtitulo" class="text-slate-400 mt-1">Todos los espacios</p>
                </div>
                
                <div class="flex items-center gap-6">
                    <div class="flex items-center gap-2 px-4 py-2 bg-slate-800 rounded-full">
                        <div id="indicator" class="w-3 h-3 bg-red-500 rounded-full shadow-[0_0_8px_rgba(34,197,94,0.6)]"></div>
                        <span id="statusText" class="text-sm font-medium">Conectando...</span>
                    </div>
                    <div class="text-sm text-slate-400">
                        Última actualización: <br><span id="lastUpdate" class="font-mono text-slate-300">--</span>
                    </div>
                </div>
            </header>

            <div class="flex-1 p-8 overflow-auto">
                <div id="espaciosContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

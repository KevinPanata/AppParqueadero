spring:
  application:
    name: zonas-espacios

  datasource:
    # Cambiamos a localhost y puerto 3307 para que IntelliJ pueda conectarse desde afuera
    url: jdbc:mysql://localhost:3307/zonas_espacios?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: "123"
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

    # Configuración de RabbitMQ
    rabbitmq:
      host: ${RABBITMQ_HOST:localhost}
      port: ${RABBITMQ_PORT:5672}
      username: ${RABBITMQ_USER:admin}
      password: ${RABBITMQ_PASSWORD:admin123}
      exchange: ${RABBITMQ_EXCHANGE:exchange_audit}
      routing-key: ${RABBITMQ_ROUTING_KEY:routing_audit}

server:
  port: 8081

jwt:
  secret: 5b8c34f8a7d2e901f4c6b1a3d8e5f7a2b9c0d1e4f6a8b3c5d7e9f1a2b4c6d8e0
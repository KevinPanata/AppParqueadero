name: "CodeQL Security Analysis"

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]

  schedule:
    - cron: "30 5 * * 1"

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended

      - name: Build Java projects manually
        if: matrix.language == 'java-kotlin'
        run: |
          set -e

          echo "Buscando proyectos Java con Maven o Gradle..."

          if find . -name "pom.xml" -not -path "*/target/*" | grep -q .; then
            echo "Proyectos Maven encontrados."

            while IFS= read -r pom; do
              dir="$(dirname "$pom")"
              echo "Compilando proyecto Maven en: $dir"
              (cd "$dir" && mvn -B clean package -DskipTests -Dmaven.test.skip=true)
            done < <(find . -name "pom.xml" -not -path "*/target/*")

          elif find . -name "gradlew" | grep -q .; then
            echo "Proyectos Gradle encontrados."

            while IFS= read -r gradle; do
              dir="$(dirname "$gradle")"
              echo "Compilando proyecto Gradle en: $dir"
              chmod +x "$dir/gradlew"
              (cd "$dir" && ./gradlew clean build -x test)
            done < <(find . -name "gradlew")

          else
            echo "No se encontraron proyectos Java con pom.xml ni gradlew."
            exit 1
          fi

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  notify-telegram:
    name: Notify Telegram
    runs-on: ubuntu-latest
    needs: analyze
    if: always()

    permissions:
      contents: read
      security-events: read

    steps:
      - name: Send Telegram notification with CodeQL summary
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RESULT: ${{ needs.analyze.result }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SECURITY_URL: https://github.com/${{ github.repository }}/security/code-scanning
        run: |
          sleep 20

          ALERTS_FILE="alerts.json"
          echo "[]" > "$ALERTS_FILE"

          page=1
          while true; do
            RESPONSE=$(curl -sS \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPOSITORY}/code-scanning/alerts?state=open&per_page=100&page=${page}")

            if echo "$RESPONSE" | jq -e 'type == "object" and has("message")' >/dev/null; then
              API_ERROR=$(echo "$RESPONSE" | jq -r '.message')
              break
            fi

            COUNT=$(echo "$RESPONSE" | jq 'length')
            jq -s '.[0] + .[1]' "$ALERTS_FILE" <(echo "$RESPONSE") > tmp.json
            mv tmp.json "$ALERTS_FILE"

            if [ "$COUNT" -lt 100 ]; then
              break
            fi

            page=$((page + 1))
          done

          TOTAL=$(jq 'length' "$ALERTS_FILE")
          CRITICAL=$(jq '[.[] | select(((.rule.security_severity_level // .rule.severity // "unknown") | ascii_downcase) == "critical")] | length' "$ALERTS_FILE")
          HIGH=$(jq '[.[] | select(((.rule.security_severity_level // .rule.severity // "unknown") | ascii_downcase) == "high")] | length' "$ALERTS_FILE")
          MEDIUM=$(jq '[.[] | select(((.rule.security_severity_level // .rule.severity // "unknown") | ascii_downcase) == "medium")] | length' "$ALERTS_FILE")
          LOW=$(jq '[.[] | select(((.rule.security_severity_level // .rule.severity // "unknown") | ascii_downcase) == "low")] | length' "$ALERTS_FILE")
          WARNING=$(jq '[.[] | select(((.rule.security_severity_level // .rule.severity // "unknown") | ascii_downcase) == "warning")] | length' "$ALERTS_FILE")
          NOTE=$(jq '[.[] | select(((.rule.security_severity_level // .rule.severity // "unknown") | ascii_downcase) == "note")] | length' "$ALERTS_FILE")
          ERROR=$(jq '[.[] | select(((.rule.security_severity_level // .rule.severity // "unknown") | ascii_downcase) == "error")] | length' "$ALERTS_FILE")

          TYPES=$(jq -r '
            sort_by(.rule.id)
            | group_by(.rule.id)
            | map({
                id: .[0].rule.id,
                desc: (.[0].rule.description // "Sin descripcion"),
                sev: ((.[0].rule.security_severity_level // .[0].rule.severity // "unknown") | ascii_upcase),
                count: length
              })
            | sort_by(.count)
            | reverse
            | .[:8]
            | map("- " + .sev + " | " + (.count|tostring) + " | " + .id + " | " + .desc)
            | join("\n")
          ' "$ALERTS_FILE")

          if [ -z "$TYPES" ]; then
            TYPES="Sin alertas abiertas."
          fi

          if [ "$RESULT" = "success" ]; then
            STATUS="CodeQL finalizo correctamente"
          else
            STATUS="CodeQL fallo o tuvo problemas en el analisis"
          fi

          if [ -n "$API_ERROR" ]; then
            SUMMARY="No se pudo obtener el resumen de alertas: $API_ERROR"
          else
            SUMMARY="Alertas abiertas: $TOTAL

          Por severidad:
          Criticas: $CRITICAL
          Altas: $HIGH
          Medias: $MEDIUM
          Bajas: $LOW
          Error: $ERROR
          Warning: $WARNING
          Note: $NOTE

          Tipos/reglas principales:
          $TYPES"
          fi

          MESSAGE="$STATUS

          Repositorio: $REPOSITORY
          Rama: $BRANCH
          Commit: ${COMMIT:0:7}
          Resultado del workflow: $RESULT

          $SUMMARY

          Ver analisis:
          $SECURITY_URL

          Ver ejecucion:
          $RUN_URL"

          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}"
name: "CodeQL Security Analysis"

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]

  schedule:
    - cron: "30 5 * * 1"

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended

      - name: Build Java projects manually
        if: matrix.language == 'java-kotlin'
        run: |
          set -e

          echo "Buscando proyectos Java con Maven o Gradle..."

          if find . -name "pom.xml" -not -path "*/target/*" | grep -q .; then
            echo "Proyectos Maven encontrados."

            while IFS= read -r pom; do
              dir="$(dirname "$pom")"
              echo "Compilando proyecto Maven en: $dir"
              (cd "$dir" && mvn -B clean package -DskipTests -Dmaven.test.skip=true)
            done < <(find . -name "pom.xml" -not -path "*/target/*")

          elif find . -name "gradlew" | grep -q .; then
            echo "Proyectos Gradle encontrados."

            while IFS= read -r gradle; do
              dir="$(dirname "$gradle")"
              echo "Compilando proyecto Gradle en: $dir"
              chmod +x "$dir/gradlew"
              (cd "$dir" && ./gradlew clean build -x test)
            done < <(find . -name "gradlew")

          else
            echo "No se encontraron proyectos Java con pom.xml ni gradlew."
            exit 1
          fi

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  notify-telegram:
    name: Notify Telegram
    runs-on: ubuntu-latest
    needs: analyze
    if: always()

    steps:
      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESULT: ${{ needs.analyze.result }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$RESULT" = "success" ]; then
            STATUS="✅ CodeQL finalizó correctamente"
          else
            STATUS="❌ CodeQL falló o encontró un problema en el análisis"
          fi

          MESSAGE=$(cat <<EOF
          $STATUS

          Repositorio: $REPOSITORY
          Rama: $BRANCH
          Commit: ${COMMIT:0:7}
          Resultado: $RESULT

          Ver detalles:
          $RUN_URL
          EOF
          )

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}"
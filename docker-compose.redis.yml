version: '3.8'
services:
  redis:
    image: redis:7-alpine
    container_name: redis-tickets
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes
    networks:
      - red_microservicios

volumes:
  redis_data:

networks:
  red_microservicios:
    external: true

